<!DOCTYPE html>
<!-- redeploy --> 
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NiCHE — Recruitment 2026</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0a0a0a;
      color: #fff;
      text-align: center;
      padding: 24px;
    }
    .tag { letter-spacing: 4px; font-size: 13px; color: #888; text-transform: uppercase; }
    h1 {
      font-size: clamp(48px, 12vw, 120px);
      font-weight: 800;
      margin: 12px 0;
      color: #f9ed4e;
      text-shadow: 0 0 28px rgba(249, 237, 78, 0.35); /* subtle glow — delete this line if you want flat color */
    }
    .sub { color: #aaa; font-size: 18px; max-width: 420px; margin: 0 auto; }

    .soon {
      margin-top: 32px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      border: 1px solid #f9ed4e;
      border-radius: 999px;
      font-size: 14px;
      color: #f9ed4e;
      animation: soonGlow 2.4s ease-in-out infinite;
    }
    @keyframes soonGlow {
      0%, 100% { box-shadow: 0 0 10px rgba(249, 237, 78, 0.35), inset 0 0 6px rgba(249, 237, 78, 0.10); }
      50%      { box-shadow: 0 0 22px rgba(249, 237, 78, 0.65), inset 0 0 10px rgba(249, 237, 78, 0.20); }
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #f9ed4e;
      animation: dotPulse 1.6s ease-in-out infinite;
    }
    @keyframes dotPulse {
      0%, 100% { transform: scale(1);   box-shadow: 0 0 6px #f9ed4e, 0 0 10px #f9ed4e; }
      50%      { transform: scale(1.3); box-shadow: 0 0 12px #f9ed4e, 0 0 22px #f9ed4e; }
    }
  </style>
</head>
<body>
  <main>
    <p class="tag">IMNU Marketing Club</p>
    <h1>NiCHE</h1>
    <p class="sub">Recruitment 2026 — where ideas become brands.</p>
    <span class="soon"><span class="dot"></span> Applicant portal · coming soon</span>
  </main>
</body>
</html>
